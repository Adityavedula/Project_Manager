<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProjectManager | Tasks</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="nav">
        <div class="nav-brand">
            <button class="btn-back" onclick="window.location.href='dashboard.html'">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                Dashboard
            </button>
        </div>
        <div class="nav-actions">
            <span class="user-badge" id="userBadge">User</span>
            <button class="btn-icon" id="logoutBtn" title="Logout">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/>
                </svg>
            </button>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <div>
                <h1 id="projectName">Loading...</h1>
                <p class="text-muted" id="projectDesc"></p>
            </div>
            <button class="btn-primary" id="newTaskBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                New Task
            </button>
        </div>

        <div class="task-filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="TODO">Todo</button>
            <button class="filter-btn" data-filter="IN_PROGRESS">In Progress</button>
            <button class="filter-btn" data-filter="COMPLETED">Completed</button>
            <button class="filter-btn" data-filter="OVERDUE">Overdue</button>
        </div>

        <div id="tasksList" class="tasks-list">
        </div>

        <div id="emptyTasks" class="empty-state hidden">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
            </svg>
            <h3>No tasks yet</h3>
            <p class="text-muted">Create your first task to start tracking progress</p>
        </div>
    </div>

    <div id="taskModal" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h3 id="taskModalTitle">Create New Task</h3>
                <button class="btn-close" id="closeTaskModal">&times;</button>
            </div>
            <form id="taskForm">
                <div class="form-group">
                    <label for="taskTitle">Title</label>
                    <input type="text" id="taskTitle" placeholder="What needs to be done?" required>
                </div>
                <div class="form-group">
                    <label for="taskDesc">Description</label>
                    <textarea id="taskDesc" rows="3" placeholder="Add details..."></textarea>
                </div>
                <div class="form-group">
                    <label for="taskAssignee">Assignee</label>
                    <select id="taskAssignee" required>
                        <option value="">Select a team member</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="taskDueDate">Due Date</label>
                    <input type="date" id="taskDueDate">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" id="cancelTaskModal">Cancel</button>
                    <button type="submit" class="btn-primary" id="submitTask">Create Task</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="project.js"></script>
</body>
</html>
