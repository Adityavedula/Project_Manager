<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProjectManager | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="nav">
        <div class="nav-brand">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
            </svg>
            <span>ProjectManager</span>
        </div>
        <div class="nav-actions">
            <span class="user-badge" id="userBadge">User</span>
            <button class="btn-icon" id="logoutBtn" title="Logout">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/>
                </svg>
            </button>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <div>
                <h1>Dashboard</h1>
                <p class="text-muted">Welcome back, <span id="userName">User</span></p>
            </div>
            <button class="btn-primary" id="newProjectBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                New Project
            </button>
        </div>

        <div id="statsGrid" class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon projects">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/>
                    </svg>
                </div>
                <div class="stat-info">
                    <span class="stat-value" id="statProjects">0</span>
                    <span class="stat-label">Projects</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon tasks">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                    </svg>
                </div>
                <div class="stat-info">
                    <span class="stat-value" id="statTasks">0</span>
                    <span class="stat-label">Total Tasks</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon progress">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
                    </svg>
                </div>
                <div class="stat-info">
                    <span class="stat-value" id="statInProgress">0</span>
                    <span class="stat-label">In Progress</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon overdue">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                </div>
                <div class="stat-info">
                    <span class="stat-value" id="statOverdue">0</span>
                    <span class="stat-label">Overdue</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon mytasks">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="8.5" cy="7" r="4"/><path d="M20 8v6M23 11h-6"/>
                    </svg>
                </div>
                <div class="stat-info">
                    <span class="stat-value" id="statMyTasks">0</span>
                    <span class="stat-label">My Tasks</span>
                </div>
            </div>
        </div>

        <div class="section-header">
            <h2>Projects</h2>
        </div>

        <div id="projectsGrid" class="projects-grid">
        </div>

        <div id="emptyState" class="empty-state hidden">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/>
            </svg>
            <h3>No projects yet</h3>
            <p class="text-muted">Create your first project to get started</p>
        </div>
    </div>

    <div id="projectModal" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">Create New Project</h3>
                <button class="btn-close" id="closeModal">&times;</button>
            </div>
            <form id="projectForm">
                <div class="form-group">
                    <label for="projName">Project Name</label>
                    <input type="text" id="projName" placeholder="Enter project name" required>
                </div>
                <div class="form-group">
                    <label for="projDesc">Description</label>
                    <textarea id="projDesc" rows="3" placeholder="Describe the project..."></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" id="cancelModal">Cancel</button>
                    <button type="submit" class="btn-primary" id="submitProject">Create Project</button>
                </div>
            </form>
        </div>
    </div>

    <div id="membersModal" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h3>Team Members</h3>
                <button class="btn-close" id="closeMembersModal">&times;</button>
            </div>
            <div id="membersList" class="members-list"></div>
            <form id="addMemberForm">
                <div class="form-group form-group-inline">
                    <input type="email" id="memberEmail" placeholder="Enter email to add" required>
                    <button type="submit" class="btn-primary">Add</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="app.js"></script>
</body>
</html>
