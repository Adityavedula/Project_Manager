<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProjectManager | Login</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                </svg>
            </div>
            <h2>Project Manager</h2>

            <div id="login-form">
                <h3>Welcome Back</h3>
                <p class="text-muted">Log in to manage your projects</p>
                <form id="loginForm">
                    <div class="form-group">
                        <label for="loginEmail">Email</label>
                        <input type="email" id="loginEmail" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="btn-primary btn-block">Login</button>
                </form>
                <p class="form-footer">
                    Don't have an account? <a href="#" id="showSignup">Sign up</a>
                </p>
            </div>

            <div class="admin-login-section">
                <div class="divider">
                    <span>OR</span>
                </div>
                <button type="button" class="btn-admin-login" id="showAdminLogin">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 15v2m-6 4h12a2 2 0 002-2v-12a2 2 0 00-2-2h-12a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                        <circle cx="12" cy="10" r="3"/>
                    </svg>
                    Admin Login
                </button>
            </div>

            <div id="admin-login-form" class="hidden">
                <div class="admin-header">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 15v2m-6 4h12a2 2 0 002-2v-12a2 2 0 00-2-2h-12a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                        <circle cx="12" cy="10" r="3"/>
                    </svg>
                    <h3>Admin Portal</h3>
                    <p class="text-muted">Restricted access for administrators</p>
                </div>
                <form id="adminLoginForm">
                    <div class="form-group">
                        <label for="adminEmail">Admin Email</label>
                        <input type="email" id="adminEmail" placeholder="admin@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="adminPassword">Admin Password</label>
                        <input type="password" id="adminPassword" placeholder="Enter admin password" required>
                    </div>
                    <button type="submit" class="btn-primary btn-block">Admin Login</button>
                </form>
                <p class="form-footer">
                    <a href="#" id="showUserLogin">← Back to User Login</a>
                </p>
            </div>

            <div id="signup-form" class="hidden">
                <h3>Create Account</h3>
                <p class="text-muted">Join and start tracking your work</p>
                <form id="signupForm">
                    <div class="form-group">
                        <label for="signupName">Full Name</label>
                        <input type="text" id="signupName" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label for="signupEmail">Email</label>
                        <input type="email" id="signupEmail" placeholder="john@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="signupPassword">Password</label>
                        <input type="password" id="signupPassword" placeholder="Min 6 characters" required>
                    </div>
                    <button type="submit" class="btn-primary btn-block">Sign Up</button>
                </form>
                <p class="form-footer">
                    Already have an account? <a href="#" id="showLogin">Login</a>
                </p>
            </div>
        </div>
    </div>
    <script src="auth.js"></script>
</body>
</html>
